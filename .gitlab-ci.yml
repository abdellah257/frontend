variables:
  DOCKER_IMAGE_NAME: docker.ill.fr/scicat-ill

stages:
  - build-image

build-image:
  stage: build-image
  tags:
    - shell
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t
      docker.ill.fr/${CI_PROJECT_PATH}:${CI_COMMIT_TAG:-$CI_COMMIT_BRANCH} .
    - docker push
      docker.ill.fr/${CI_PROJECT_PATH}:${CI_COMMIT_TAG:-$CI_COMMIT_BRANCH}
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG =~ /^v.*/
